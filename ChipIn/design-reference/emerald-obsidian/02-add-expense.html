<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Expense — Emerald Obsidian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function () {
      var themeColors = {
        "primary-container": "#ff8c42",
        "primary": "#ffb68d",
        "secondary": "#4edea3",
        "secondary-container": "#00a572",
        "tertiary": "#ffb95f",
        "tertiary-container": "#ed9800",
        "background": "#131315",
        "surface": "#131315",
        "surface-dim": "#131315",
        "surface-container-lowest": "#0e0e10",
        "surface-container-low": "#1b1b1d",
        "surface-container": "#201f21",
        "surface-container-high": "#2a2a2c",
        "surface-container-highest": "#353437",
        "surface-variant": "#353437",
        "surface-bright": "#39393b",
        "on-surface": "#e5e1e4",
        "on-surface-variant": "#ddc1b3",
        "on-background": "#e5e1e4",
        "on-primary": "#532200",
        "on-primary-container": "#6a2d00",
        "on-secondary": "#003824",
        "on-secondary-container": "#00311f",
        "on-tertiary": "#472a00",
        "outline": "#a48c7f",
        "outline-variant": "#564338",
        "error": "#ffb4ab",
        "error-container": "#93000a",
        "on-error": "#690005",
        "on-error-container": "#ffdad6"
      };
      tailwind.config = {
        theme: {
          extend: {
            colors: themeColors,
            fontFamily: {
              sans: ["Manrope", "ui-sans-serif", "system-ui", "sans-serif"]
            }
          }
        }
      };
    })();
  </script>
  <style>
    .material-symbols-outlined {
      font-family: "Material Symbols Outlined";
      font-weight: normal;
      font-style: normal;
      font-size: 1.25rem;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "liga";
    }
    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .amount-input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
  </style>
</head>
<body class="min-h-screen bg-surface-container-lowest font-sans text-on-surface antialiased pb-28 md:pb-8">
  <div class="mx-auto flex min-h-screen max-w-lg flex-col bg-surface-container-low md:my-6 md:min-h-0 md:max-h-[90vh] md:overflow-hidden md:rounded-3xl md:shadow-2xl md:ring-1 md:ring-outline-variant">
    <header class="sticky top-0 z-20 flex shrink-0 items-center justify-between border-b border-outline-variant/40 bg-surface-container-low px-4 py-3 backdrop-blur-sm md:rounded-t-3xl">
      <button type="button" class="text-sm font-semibold text-secondary">Cancel</button>
      <h1 class="text-base font-bold text-on-surface">Add Expense</h1>
      <button type="button" class="text-sm font-semibold" style="color: #ff8c42">Save</button>
    </header>

    <main class="flex-1 overflow-y-auto px-4 pb-6 pt-4">
      <section class="rounded-2xl bg-primary-container px-5 py-8 text-center shadow-inner">
        <label class="sr-only" for="amount">Amount</label>
        <div class="flex items-baseline justify-center gap-1">
          <span class="text-3xl font-bold text-on-primary-container">$</span>
          <input
            id="amount"
            class="amount-input w-40 max-w-full bg-transparent text-center text-5xl font-bold tracking-tight text-on-primary-container placeholder:text-on-primary-container/50 focus:outline-none"
            type="number"
            inputmode="decimal"
            placeholder="0.00"
            value="42.50"
          />
        </div>
      </section>

      <section class="mt-6">
        <div class="flex items-end gap-2 border-b border-outline pb-1">
          <span class="material-symbols-outlined text-on-surface-variant" aria-hidden="true">receipt_long</span>
          <label class="sr-only" for="title">What was it for?</label>
          <input
            id="title"
            type="text"
            placeholder="What was it for?"
            class="min-w-0 flex-1 bg-transparent text-base text-on-surface placeholder:text-on-surface-variant focus:outline-none"
          />
        </div>
      </section>

      <section class="mt-5 flex flex-wrap gap-2">
        <button type="button" class="rounded-full border border-outline bg-surface-container-high px-4 py-2 text-sm font-medium text-on-surface">Today</button>
        <button type="button" class="rounded-full border border-outline bg-surface-container-high px-4 py-2 text-sm font-medium text-on-surface">Category</button>
      </section>

      <section class="mt-6">
        <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-on-surface-variant">Split strategy</h2>
        <div class="flex flex-wrap gap-2">
          <button type="button" class="rounded-full bg-secondary px-4 py-2 text-sm font-semibold text-on-secondary">Equal</button>
          <button type="button" class="rounded-full border border-outline-variant bg-surface-container-high px-4 py-2 text-sm font-medium text-on-surface-variant">Percent</button>
          <button type="button" class="rounded-full border border-outline-variant bg-surface-container-high px-4 py-2 text-sm font-medium text-on-surface-variant">Exact</button>
          <button type="button" class="rounded-full border border-outline-variant bg-surface-container-high px-4 py-2 text-sm font-medium text-on-surface-variant">Shares</button>
          <button type="button" class="rounded-full border border-outline-variant bg-surface-container-high px-4 py-2 text-sm font-medium text-on-surface-variant">By Item</button>
        </div>
      </section>

      <section class="mt-6">
        <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-on-surface-variant">Participants</h2>
        <ul class="space-y-3">
          <li class="flex items-center justify-between gap-3 rounded-xl bg-surface-container px-3 py-3">
            <span class="font-medium text-on-surface">You</span>
            <div class="flex rounded-full bg-surface-container-highest p-0.5" role="group" aria-label="You split">
              <button type="button" class="rounded-full bg-secondary px-3 py-1 text-xs font-semibold text-on-secondary">In</button>
              <button type="button" class="rounded-full px-3 py-1 text-xs font-medium text-on-surface-variant">Out</button>
            </div>
          </li>
          <li class="flex items-center justify-between gap-3 rounded-xl bg-surface-container px-3 py-3">
            <span class="font-medium text-on-surface">Sarah</span>
            <div class="flex rounded-full bg-surface-container-highest p-0.5" role="group" aria-label="Sarah split">
              <button type="button" class="rounded-full bg-secondary px-3 py-1 text-xs font-semibold text-on-secondary">In</button>
              <button type="button" class="rounded-full px-3 py-1 text-xs font-medium text-on-surface-variant">Out</button>
            </div>
          </li>
          <li class="flex items-center justify-between gap-3 rounded-xl bg-surface-container px-3 py-3">
            <span class="font-medium text-on-surface">Alex</span>
            <div class="flex rounded-full bg-surface-container-highest p-0.5" role="group" aria-label="Alex split">
              <button type="button" class="rounded-full px-3 py-1 text-xs font-medium text-on-surface-variant">In</button>
              <button type="button" class="rounded-full bg-surface-container-high px-3 py-1 text-xs font-semibold text-on-surface">Out</button>
            </div>
          </li>
        </ul>
        <button
          type="button"
          class="mt-4 flex w-full items-center justify-center gap-2 rounded-xl border-2 border-dashed border-outline py-3 text-sm font-medium text-on-surface-variant transition-colors hover:border-secondary hover:text-secondary"
        >
          <span class="material-symbols-outlined text-base" aria-hidden="true">person_add</span>
          Add more people
        </button>
      </section>

      <section class="mt-6 grid grid-cols-2 gap-3">
        <button
          type="button"
          class="flex flex-col items-start gap-2 rounded-2xl border border-outline-variant bg-surface-container p-4 text-left transition-colors hover:border-outline"
        >
          <span class="material-symbols-outlined text-secondary" aria-hidden="true">event_repeat</span>
          <span class="text-sm font-semibold text-on-surface">Recurring</span>
          <span class="text-xs text-on-surface-variant">Schedule repeats</span>
        </button>
        <button
          type="button"
          class="flex flex-col items-start gap-2 rounded-2xl border border-outline-variant bg-surface-container p-4 text-left transition-colors hover:border-outline"
        >
          <span class="material-symbols-outlined text-tertiary" aria-hidden="true">document_scanner</span>
          <span class="text-sm font-semibold text-on-surface">Scan receipt</span>
          <span class="text-xs text-on-surface-variant">Camera or upload</span>
        </button>
      </section>

      <div class="mt-8 hidden md:block">
        <button
          type="button"
          class="w-full rounded-2xl py-4 text-center text-base font-bold text-on-primary-container"
          style="background-color: #ff8c42"
        >
          Create Expense
        </button>
      </div>
    </main>

    <div
      class="pointer-events-none fixed inset-x-0 bottom-0 z-30 bg-gradient-to-t from-surface-container-lowest via-surface-container-lowest/95 to-transparent pt-16 pb-6 md:hidden"
      aria-hidden="true"
    ></div>
    <div class="fixed inset-x-0 bottom-0 z-40 p-4 pb-[max(1rem,env(safe-area-inset-bottom))] md:hidden">
      <button
        type="button"
        class="pointer-events-auto w-full rounded-2xl py-4 text-center text-base font-bold text-on-primary-container shadow-lg shadow-black/30"
        style="background-color: #ff8c42"
      >
        Create Expense
      </button>
    </div>
  </div>
</body>
</html>
